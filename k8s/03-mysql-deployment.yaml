apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: baemtli-project
spec:
  selector:
    matchLabels:
      app: mysql
  strategy:
    type: Recreate # Prevent multiple mysql instances: simultaneous data access is dangerous in mysql...
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - image: mysql:8.0
          name: mysql
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: baemtli-secrets
                  key: mysql-root-password
            - name: MYSQL_DATABASE
              value: baemtli # Create database if not exists...
          ports:
            - containerPort: 3306
              name: mysql
          volumeMounts:
            - name: mysql-persistent-storage
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-persistent-storage
          persistentVolumeClaim:
            claimName: mysql-pv-claim
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: baemtli-project
spec:
  ports:
    - port: 3306
  selector:
    app: mysql
  clusterIP: None # service is headless because it's only needed inside K8s cluster, not outside.


