apiVersion: apps/v1
kind: Deployment
metadata:
  name: baemtli-frontend
  namespace: baemtli-project
spec:
  replicas: 2 # Use RepicaSet of 2 Pods for better availability
  selector:
    matchLabels:
      app: baemtli-frontend
  template:
    metadata:
      labels:
        app: baemtli-frontend
    spec:
      containers:
        - name: frontend
          image: baemtli-frontend:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            # Inform frontend where to find the backend.
            - name: NEXT_PUBLIC_API_URL
              value: "http://backend-service:8080/api/v1"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: baemtli-project
spec:
  type: NodePort # Allow to access app from the browser
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30080 # Make app available on http://localhost:30080
  selector:
    app: baemtli-frontend

