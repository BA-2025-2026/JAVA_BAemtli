# Application Properties to set db connection, db user, db password and others.

# API Versioning and Spring App Name
server.servlet.context-path=/api/v1
spring.application.name=baemtli

# Database Connection
# Syntax of variables: ${ENV_VARIABLE:fallbackValue}
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:Baemtli}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:1234}

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

